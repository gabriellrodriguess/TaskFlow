<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topo">
      <h1>TaskFlow</h1>
      <p>Organize sua rotina de forma simples e eficiente.</p>
    </header>

    <main class="card">
      <div class="input-area">
        <input
          type="text"
          id="inputTarefa"
          placeholder="Digite uma nova tarefa..."
        >
        <button id="btnAdicionar">Adicionar</button>
      </div>

      <div class="filtros">
        <button class="filtro ativo" data-filtro="todas">Todas</button>
        <button class="filtro" data-filtro="ativas">Pendentes</button>
        <button class="filtro" data-filtro="concluidas">Concluídas</button>
      </div>

      <ul id="lista"></ul>

      <p id="mensagemVazia" class="mensagem-vazia">
        Nenhuma tarefa por aqui.
      </p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
